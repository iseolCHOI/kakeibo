<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="kakeibo">
<title>kakeibo</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📒</text></svg>">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0efe9;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#aaa;
  --border:#e5e5e0;--border2:#d0d0ca;
  --green:#1D9E75;--green-bg:#e1f5ee;
  --red:#D85A30;--red-bg:#faece7;
  --blue:#378ADD;--blue-bg:#e6f1fb;
  --amber:#BA7517;--amber-bg:#faeeda;
  --teal:#0F6E56;--purple:#7F77DD;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.06);
}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;--border:#3a3a3c;--border2:#48484a;}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;min-height:100vh;overflow-x:hidden}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px}
#loading .logo{font-size:36px}
#loading p{font-size:14px;color:var(--text2)}
#nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:0.5px solid var(--border);display:flex;z-index:100;height:calc(56px + max(env(safe-area-inset-bottom),20px))}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 4px calc(max(env(safe-area-inset-bottom),20px)/2);gap:3px;border:none;background:none;color:var(--text3);font-size:12px;cursor:pointer;transition:color .15s}
.nav-btn.on{color:var(--blue)}
.nav-btn svg{width:22px;height:22px}
#app{padding-bottom:calc(72px + max(env(safe-area-inset-bottom),20px))}
.page{display:none;padding:0 0 16px}.page.on{display:block}
.page-header{padding:16px 16px 0;display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.page-title{font-size:20px;font-weight:600}
.header-btn{padding:6px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);font-size:13px;color:var(--text);cursor:pointer}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin:12px 16px 0;box-shadow:var(--shadow)}
.card-title{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:12px;letter-spacing:.5px}
.hero{background:var(--bg2);border-radius:var(--radius);margin:12px 16px 0;padding:20px}
.hero-label{font-size:12px;color:var(--text2);margin-bottom:4px}
.hero-amount{font-size:32px;font-weight:700;letter-spacing:-1px}
.hero-sub{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:16px}
.hero-item{background:var(--bg);border-radius:var(--radius-sm);padding:10px;text-align:center}
.hero-item-label{font-size:11px;color:var(--text2);margin-bottom:3px}
.hero-item-val{font-size:15px;font-weight:600}
.joint-card{background:var(--amber-bg);border:0.5px solid var(--amber);border-radius:var(--radius);margin:10px 16px 0;padding:16px;display:flex;justify-content:space-between;align-items:center}
.joint-left label{font-size:12px;color:var(--amber);font-weight:500;margin-bottom:4px;display:block}
.joint-left .val{font-size:22px;font-weight:700;color:var(--amber)}
.joint-right{text-align:right}
.joint-row{margin-bottom:4px}
.joint-row label{font-size:11px;color:var(--amber)}
.joint-row span{font-size:14px;font-weight:600;color:#5a3a00;display:block;text-align:right;margin-top:2px}
.form-group{display:flex;flex-direction:column;gap:8px}
.form-row{display:grid;gap:8px}.form-row.col2{grid-template-columns:1fr 1fr}
input,select{width:100%;padding:11px 13px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:15px;background:var(--bg2);color:var(--text);outline:none;-webkit-appearance:none;appearance:none}
input:focus,select:focus{border-color:var(--blue);background:var(--bg)}
.submit-btn{width:100%;padding:13px;border-radius:var(--radius);border:none;background:var(--blue);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}
.submit-btn:active{opacity:.85}
.list-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:0.5px solid var(--border)}
.list-item:last-child{border-bottom:none}
.item-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.item-info{min-width:0}
.item-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-sub{font-size:12px;color:var(--text2);margin-top:1px}
.item-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.item-amt{font-size:15px;font-weight:600}
.del-btn{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:0 2px;line-height:1}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-blue{background:var(--blue-bg);color:var(--blue)}.badge-green{background:var(--green-bg);color:var(--teal)}
.prog-bg{height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;margin:8px 0 4px}
.prog-fill{height:100%;border-radius:4px;transition:width .4s}
.perf-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin:8px 16px 0}
.perf-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.perf-name{font-size:15px;font-weight:600}
.perf-owner{font-size:12px;color:var(--text2);margin-top:2px}
.perf-pct{font-size:22px;font-weight:700}
.perf-detail{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-top:4px}
.sav-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin:8px 16px 0}
.sav-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.sav-name{font-size:15px;font-weight:600;margin-bottom:3px}
.sav-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.sav-item label{font-size:11px;color:var(--text2);display:block;margin-bottom:2px}
.sav-item span{font-size:14px;font-weight:500}
.sav-footer{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:0.5px solid var(--border)}
.summary-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 16px 0}
.stat-card{background:var(--bg2);border-radius:var(--radius-sm);padding:14px}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.stat-val{font-size:18px;font-weight:700}
.avg-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:0.5px solid var(--border)}
.avg-row:last-child{border-bottom:none}
.avg-cat{flex:1;font-size:13px;display:flex;align-items:center;gap:6px}
.avg-bars{flex:2;position:relative;height:5px;background:var(--bg3);border-radius:3px}
.avg-bar-avg{position:absolute;top:0;left:0;height:100%;border-radius:3px;opacity:.35}
.avg-bar-cur{position:absolute;top:0;left:0;height:100%;border-radius:3px}
.avg-diff{font-size:12px;font-weight:600;min-width:70px;text-align:right}
.segment{display:flex;background:var(--bg2);border-radius:var(--radius-sm);padding:3px;margin:12px 16px 0;gap:2px}
.seg-btn{flex:1;padding:7px;border-radius:6px;border:none;background:none;font-size:13px;color:var(--text2);cursor:pointer;font-weight:500}
.seg-btn.on{background:var(--bg);color:var(--text);box-shadow:var(--shadow)}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:flex-end}
.modal-backdrop.open{display:flex}
.modal{background:var(--bg);border-radius:20px 20px 0 0;width:100%;padding:20px 16px calc(16px + env(safe-area-inset-bottom));max-height:90vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:600;margin-bottom:16px}
.sel-wrap{position:relative}
.sel-wrap::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none;font-size:12px}
.empty-state{text-align:center;padding:32px 16px;color:var(--text3);font-size:14px}
.green-text{color:var(--green)}.red-text{color:var(--red)}.blue-text{color:var(--blue)}.teal-text{color:var(--teal)}.amber-text{color:var(--amber)}
.section-label{font-size:12px;font-weight:500;color:var(--text2);padding:16px 16px 8px;letter-spacing:.5px}
</style>
</head>
<body>
<div id="loading"><div class="logo">💰</div><p>불러오는 중...</p></div>
<div id="app" style="display:none">

<nav id="nav">
  <button class="nav-btn on" onclick="showPage('book')" id="nav-book">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>가계부
  </button>
  <button class="nav-btn" onclick="showPage('income')" id="nav-income">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2v20M17 7H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>수입
  </button>
  <button class="nav-btn" onclick="showPage('card')" id="nav-card">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>카드
  </button>
  <button class="nav-btn" onclick="showPage('saving')" id="nav-saving">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M19 11a7 7 0 01-7 7A7 7 0 015 11"/><path d="M12 4a4 4 0 014 4H8a4 4 0 014-4z"/><path d="M9 18v2M15 18v2"/><path d="M19 11h1a1 1 0 011 1v1a1 1 0 01-1 1h-1"/><circle cx="9.5" cy="10.5" r=".5" fill="currentColor"/></svg>예적금
  </button>
  <button class="nav-btn" onclick="showPage('summary')" id="nav-summary">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>요약
  </button>
</nav>

<div class="page on" id="page-book">
  <div class="page-header"><span class="page-title">가계부</span><button class="header-btn" onclick="openModal('modal-exp')">+ 지출 추가</button></div>
  <div class="hero">
    <div class="hero-label">이번 달 남은 금액 (개인)</div>
    <div class="hero-amount" id="book-remain">—</div>
    <div class="hero-sub">
      <div class="hero-item"><div class="hero-item-label">총 수입</div><div class="hero-item-val blue-text" id="book-income">—</div></div>
      <div class="hero-item"><div class="hero-item-label">저축 (납입완료)</div><div class="hero-item-val teal-text" id="book-saving">0원</div></div>
      <div class="hero-item"><div class="hero-item-label">실소비</div><div class="hero-item-val red-text" id="book-spent">0원</div></div>
    </div>
  </div>
  <div class="joint-card">
    <div class="joint-left"><label>생활비 잔액 (모임통장)</label><div class="val" id="book-joint-remain">—</div></div>
    <div class="joint-right">
      <div class="joint-row"><label>지출</label><span id="book-joint-out">0원</span></div>
    </div>
  </div>
  <div class="segment">
    <button class="seg-btn on" onclick="filterExp('all',this)">전체</button>
    <button class="seg-btn" onclick="filterExp('이설',this)">이설</button>
    <button class="seg-btn" onclick="filterExp('상훈',this)">상훈</button>
  </div>
  <div id="exp-list"></div>
</div>

<div class="page" id="page-income">
  <div class="page-header"><span class="page-title">수입</span><button class="header-btn" onclick="openModal('modal-income')">+ 추가</button></div>
  <div class="summary-stats">
    <div class="stat-card"><div class="stat-label">이번 달 총 수입</div><div class="stat-val blue-text" id="income-total">0원</div></div>
    <div class="stat-card"><div class="stat-label">급여 외 수입</div><div class="stat-val green-text" id="income-extra">0원</div></div>
  </div>
  <div class="section-label">이설</div>
  <div class="card" style="padding:0 16px"><div id="income-list-이설"></div></div>
  <div class="section-label">상훈</div>
  <div class="card" style="padding:0 16px"><div id="income-list-상훈"></div></div>
</div>

<div class="page" id="page-card">
  <div class="page-header"><span class="page-title">카드 실적</span><button class="header-btn" onclick="openModal('modal-card-add')">+ 카드 추가</button></div>
  <div class="segment">
    <button class="seg-btn on" onclick="filterCard('all',this)">전체</button>
    <button class="seg-btn" onclick="filterCard('이설',this)">이설</button>
    <button class="seg-btn" onclick="filterCard('상훈',this)">상훈</button>
  </div>
  <div id="card-perf-list"></div>
</div>

<div class="page" id="page-saving">
  <div class="page-header"><span class="page-title">예적금</span><button class="header-btn" onclick="openModal('modal-saving')">+ 추가</button></div>
  <div class="summary-stats">
    <div class="stat-card"><div class="stat-label">이번달 납입액</div><div class="stat-val teal-text" id="sav-monthly">0원</div></div>
    <div class="stat-card"><div class="stat-label">만기 수령 예상</div><div class="stat-val green-text" id="sav-expect">0원</div></div>
  </div>
  <div id="sav-list"></div>
</div>

<div class="page" id="page-summary">
  <div class="page-header">
    <span class="page-title">월별 요약</span>
    <div class="sel-wrap" style="width:110px"><select id="summary-month" onchange="renderSummary()" style="font-size:13px;padding:6px 10px"></select></div>
  </div>
  <div class="summary-stats">
    <div class="stat-card"><div class="stat-label">실소비</div><div class="stat-val red-text" id="sum-spent">0원</div><div id="sum-avg-badge" style="margin-top:4px"></div></div>
    <div class="stat-card"><div class="stat-label">남은 금액</div><div class="stat-val green-text" id="sum-remain">—</div></div>
  </div>
  <div class="card"><div class="card-title">카테고리별 지출</div><div id="sum-cat-list"></div></div>
  <div class="card"><div class="card-title">평균 대비 이번 달</div><div id="sum-avg-compare"><div class="empty-state">2개월 이상 데이터가 쌓이면 표시돼요</div></div></div>
</div>
</div>

<div class="modal-backdrop" id="modal-exp" onclick="closeModalOutside(event,'modal-exp')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">지출 추가</div>
    <div class="form-group">
      <div class="form-row col2">
        <input type="text" id="exp-name" placeholder="항목 이름">
        <input type="number" id="exp-amt" placeholder="금액" inputmode="numeric">
      </div>
      <input type="date" id="exp-date">
      <div class="form-row col2">
        <div class="sel-wrap"><select id="exp-cat">
          <option value="">카테고리</option>
          <option>식비</option><option>교통</option><option>쇼핑</option><option>주거</option>
          <option>의료</option><option>문화/여가</option><option>용돈</option><option>보험</option>
          <option>기타</option>
        </select></div>
        <div class="sel-wrap"><select id="exp-card"></select></div>
      </div>
      <div class="sel-wrap"><select id="exp-person"><option value="이설">이설</option><option value="상훈">상훈</option><option value="공동">공동</option></select></div>
      <input type="text" id="exp-memo" placeholder="메모 (선택)">
      <button class="submit-btn" onclick="addExp()">추가하기</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modal-exp-edit" onclick="closeModalOutside(event,'modal-exp-edit')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">지출 수정</div>
    <input type="hidden" id="edit-exp-id">
    <div class="form-group">
      <div class="form-row col2">
        <input type="text" id="edit-exp-name" placeholder="항목 이름">
        <input type="number" id="edit-exp-amt" placeholder="금액" inputmode="numeric">
      </div>
      <input type="date" id="edit-exp-date">
      <div class="form-row col2">
        <div class="sel-wrap"><select id="edit-exp-cat">
          <option value="">카테고리</option>
          <option>식비</option><option>교통</option><option>쇼핑</option><option>주거</option>
          <option>의료</option><option>문화/여가</option><option>용돈</option><option>보험</option>
          <option>기타</option>
        </select></div>
        <div class="sel-wrap"><select id="edit-exp-card"></select></div>
      </div>
      <div class="sel-wrap"><select id="edit-exp-person"><option value="이설">이설</option><option value="상훈">상훈</option><option value="공동">공동</option></select></div>
      <input type="text" id="edit-exp-memo" placeholder="메모 (선택)">
      <button class="submit-btn" onclick="updateExp()">수정 완료</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modal-income" onclick="closeModalOutside(event,'modal-income')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">수입 추가</div>
    <div class="form-group">
      <div class="form-row col2">
        <input type="text" id="inc-name" placeholder="항목 이름">
        <input type="number" id="inc-amt" placeholder="금액" inputmode="numeric">
      </div>
      <input type="date" id="inc-date">
      <div class="form-row col2">
        <div class="sel-wrap"><select id="inc-type"><option>급여</option><option>생활비</option><option>부업</option><option>용돈</option><option>환급금</option><option>상여금</option><option>기타</option></select></div>
        <div class="sel-wrap"><select id="inc-person"><option>이설</option><option>상훈</option><option>공동</option></select></div>
      </div>
      <input type="text" id="inc-memo" placeholder="메모 (선택)">
      <button class="submit-btn" onclick="addIncome()">추가하기</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modal-card-add" onclick="closeModalOutside(event,'modal-card-add')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">카드 추가</div>
    <div class="form-group">
      <input type="text" id="new-card-name" placeholder="카드 이름 (예: 신한카드)">
      <div class="form-row col2">
        <div class="sel-wrap"><select id="new-card-owner"><option value="이설">이설</option><option value="상훈">상훈</option></select></div>
        <div class="sel-wrap"><select id="new-card-payday"><option value="">결제일</option></select></div>
      </div>
      <input type="number" id="new-card-target" placeholder="목표 실적 (원)" inputmode="numeric">
      <button class="submit-btn" onclick="addCard()">추가하기</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modal-card-edit" onclick="closeModalOutside(event,'modal-card-edit')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">실적 수정</div>
    <input type="hidden" id="edit-card-id">
    <div class="form-group">
      <input type="number" id="edit-card-target" placeholder="목표 실적 (원)" inputmode="numeric">
      <div class="sel-wrap"><select id="edit-card-payday"></select></div>
      <button class="submit-btn" onclick="updateCard()">수정 완료</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modal-saving" onclick="closeModalOutside(event,'modal-saving')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">예적금 추가</div>
    <div class="form-group">
      <div class="form-row col2">
        <input type="text" id="sav-name" placeholder="상품명">

// ── 날짜 기반 동적 저축 차감 로직 ──
function getDeductedSavings(sv, ym) {
  const today = new Date();
  const curY = today.getFullYear(), curM = today.getMonth() + 1, curD = today.getDate();
  const [yStr, mStr] = ym.split('-');
  const y = parseInt(yStr), m = parseInt(mStr);
  const svCycle = sv.cycle || 'monthly'; // 이전 데이터 호환성
  const svPayDay = sv.payDay || 1;
  
  // 시작 전이거나 만기일이 지난 달인 경우 차감 안 함
  if(sv.start && sv.start.slice(0,7) > ym) return 0;
  if(sv.maturity && sv.maturity.slice(0,7) < ym) return 0;

  // 일시납(예금)인 경우 가입한 달에만 1회 차감
  if(svCycle === 'once' || sv.type === '예금') {
    return (sv.start && sv.start.slice(0,7) === ym) ? sv.amt : 0;
  }

  // 매월 납부
  if(svCycle === 'monthly') {
    const pDay = parseInt(svPayDay);
    // 조회하는 달이 미래 달이면 0
    if(y > curY || (y === curY && m > curM)) return 0;
    // 과거 달이면 1회 전액 차감
    if(y < curY || (y === curY && m < curM)) return sv.amt;
    // 이번 달이면 현재 날짜가 결제일(pDay)을 지났는지 확인
    return curD >= pDay ? sv.amt : 0;
  }

  // 매주 납부
  if(svCycle === 'weekly') {
    const wDay = parseInt(svPayDay); // 0(일)~6(토)
    let count = 0;
    const daysInMonth = new Date(y, m, 0).getDate();
    for(let d=1; d<=daysInMonth; d++) {
       const dateObj = new Date(y, m-1, d);
       if(dateObj.getDay() === wDay) {
          // 미래 달이면 카운트 안 함
          if(y > curY || (y === curY && m > curM)) continue;
          // 이번 달이면 오늘 이하일 때만 카운트, 과거 달은 모두 카운트
          if(y < curY || (y === curY && m < curM) || d <= curD) {
             const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
             // 적금 시작일 이후, 만기일 이전인지 체크
             if((!sv.start || dateStr >= sv.start) && (!sv.maturity || dateStr <= sv.maturity)) {
                 count++;
             }
          }
       }
    }
    return sv.amt * count;
  }
  return 0;
}

function renderExpenses(){
  const ym=nowYM();
  const livingIn=incomes.filter(i=>i.date?.startsWith(ym)&&i.type==='생활비').reduce((s,i)=>s+i.amt,0);

}

function calcExpect(sv){
  if(!sv.maturity||!sv.start||!sv.rate)return null;
  const m=Math.max(1,Math.round((new Date(sv.maturity)-new Date(sv.start))/(1000*60*60*24*30.44)));
  return sv.type==='적금'
    ?Math.round(sv.amt*m+sv.amt*m*(m+1)/2*(sv.rate/100/12))
    :Math.round(sv.amt*(1+(sv.rate/100)*(m/12)));
}
function dDay(mat){
  if(!mat)return{text:'만기일 미설정',color:'var(--text3)'};
  const d=Math.ceil((new Date(mat)-new Date())/(1000*60*60*24));
  if(d<0)return{text:'만기 완료',color:'var(--green)'};
  if(d===0)return{text:'오늘 만기',color:'var(--green)'};
  if(d<=30)return{text:'D-'+d,color:'var(--red)'};
  if(d<=90)return{text:'D-'+d,color:'var(--amber)'};
  return{text:'D-'+d,color:'var(--green)'};
}
function progPct(s,m){
  if(!s||!m)return 0;
  return Math.min(100,Math.max(0,Math.round((new Date()-new Date(s))/(new Date(m)-new Date(s))*100)));
}
function renderSavings(){
  const ym=nowYM();
  const monthly=savings.reduce((s,sv)=>s+getDeductedSavings(sv, ym),0);
  const totalExpect=savings.map(calcExpect).filter(Boolean).reduce((a,b)=>a+b,0);
  document.getElementById('sav-monthly').textContent=fmt(monthly);
  document.getElementById('sav-expect').textContent=totalExpect?fmt(totalExpect):'—';
  const el=document.getElementById('sav-list');
  if(!savings.length){el.innerHTML='<div class="empty-state">등록된 예적금이 없어요</div>';return;}
  el.innerHTML=savings.map(sv=>{
    const dd=dDay(sv.maturity),pct=progPct(sv.start,sv.maturity),exp=calcExpect(sv);
    const svCycle = sv.cycle || 'monthly';
    const cycleText = svCycle === 'monthly' ? `매월 ${sv.payDay||1}일` : svCycle === 'weekly' ? `매주 ${['일','월','화','수','목','금','토'][sv.payDay||0]}요일` : '일시납';
    
    return `<div class="sav-card">
      <div class="sav-header">
        <div><div class="sav-name">${sv.name}</div>
          <span class="badge ${sv.type==='예금'?'badge-blue':'badge-green'}">${sv.type}</span>
          <span class="badge" style="margin-left:4px;background:var(--bg2);color:var(--text2)">${sv.owner}</span></div>
        <button class="del-btn" onclick="delSaving('${sv.id}')">×</button>
      </div>
      <div class="sav-grid">
        <div class="sav-item"><label>1회 납입액 (${cycleText})</label><span class="teal-text">${fmt(sv.amt)}</span></div>
        <div class="sav-item"><label>이율</label><span>${sv.rate?sv.rate+'%':'—'}</span></div>
        <div class="sav-item"><label>시작일</label><span>${sv.start||'—'}</span></div>
        <div class="sav-item"><label>만기일</label><span style="color:${dd.color}">${sv.maturity?sv.maturity+' '+dd.text:dd.text}</span></div>
      </div>
      ${sv.start&&sv.maturity?`<div class="prog-bg"><div class="prog-fill" style="width:${pct}%;background:var(--teal)"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:8px"><span>진행률</span><span>${pct}%</span></div>`:''}
      <div class="sav-footer">
        <span style="font-size:12px;color:var(--text2)">만기 수령 예상</span>
        <span style="font-size:15px;font-weight:600;color:var(--green)">${exp?fmt(exp):'—'}</span>
      </div>
    </div>`;
  }).join('');
}

// ── 월별 요약 ──
function buildMonthOptions(){
  const all=[...new Set([...expenses.map(e=>e.date?.slice(0,7)),...incomes.map(i=>i.date?.slice(0,7)),nowYM()].filter(Boolean))].sort().reverse();
  const sel=document.getElementById('summary-month');
  const cur=sel.value||nowYM();
  sel.innerHTML=all.map(m=>`<option value="${m}" ${m===cur?'selected':''}>${m}</option>`).join('');
}
window.renderSummary = () => {
  buildMonthOptions();
  const ym=document.getElementById('summary-month').value||nowYM();
  const exps=expenses.filter(e=>e.date?.startsWith(ym));
  const incs=incomes.filter(i=>i.date?.startsWith(ym));
  const spent=exps.reduce((s,e)=>s+e.amt,0);
  const personalSpent=exps.filter(e=>e.card!=='모임통장').reduce((s,e)=>s+e.amt,0);
  const incTotal=incs.filter(i=>i.type!=='생활비').reduce((s,i)=>s+i.amt,0);
  
  // 요약 탭에서도 해당 월(ym) 기준 동적 차감
  const savMonthly=savings.reduce((s,sv)=>s+getDeductedSavings(sv, ym),0);
  
  const remain=incTotal-spent-savMonthly;
  document.getElementById('sum-spent').textContent=fmt(personalSpent);
  document.getElementById('sum-remain').textContent=incTotal?fmt(incTotal-personalSpent-savMonthly):'수입 입력 필요';
  document.getElementById('sum-remain').style.color=(incTotal-personalSpent-savMonthly)<0?'var(--red)':'var(--green)';

  const allMonths=[...new Set(expenses.map(e=>e.date?.slice(0,7)).filter(Boolean))].sort();
  const pastMonths=allMonths.filter(m=>m!==ym);
  if(pastMonths.length>0){
    const pastAvg=Math.round(pastMonths.map(m=>expenses.filter(e=>e.date?.startsWith(m)&&e.cat!=='생활비').reduce((s,e)=>s+e.amt,0)).reduce((a,b)=>a+b,0)/pastMonths.length);
    const diff=spent-pastAvg,sign=diff>0?'+':'',col=diff>0?'var(--red)':'var(--green)',bg=diff>0?'var(--red-bg)':'var(--green-bg)';
    document.getElementById('sum-avg-badge').innerHTML=`<span class="badge" style="background:${bg};color:${col}">평균 대비 ${sign}${fmt(Math.abs(diff))}</span>`;
  }else document.getElementById('sum-avg-badge').innerHTML='';

  const catMap={};
  exps.forEach(e=>{catMap[e.cat]=(catMap[e.cat]||0)+e.amt;});
  const cats=Object.keys(catMap).sort((a,b)=>catMap[b]-catMap[a]);
  
  const catEl=document.getElementById('sum-cat-list');
  catEl.innerHTML=cats.length?cats.map(c=>`
    <div class="list-item">
      <div class="item-left"><span class="item-dot" style="background:${CAT_COLORS[c]||'#888'}"></span><span>${c}</span></div>
      <div class="item-right"><span style="font-weight:600">${fmt(catMap[c])}</span><span style="font-size:12px;color:var(--text2);margin-left:6px">${spent?Math.round(catMap[c]/spent*100):0}%</span></div>
    </div>`).join(''):'<div class="empty-state">지출 내역이 없어요</div>';

  const avgEl=document.getElementById('sum-avg-compare');
  if(pastMonths.length>0){
    const allCats=[...new Set(expenses.map(e=>e.cat))];
    const rows=allCats.map(cat=>{
      const curAmt=exps.filter(e=>e.cat===cat).reduce((s,e)=>s+e.amt,0);
      const avg=Math.round(pastMonths.map(m=>expenses.filter(e=>e.date?.startsWith(m)&&e.cat===cat).reduce((s,e)=>s+e.amt,0)).reduce((a,b)=>a+b,0)/pastMonths.length);
      return{cat,curAmt,avg};
    }).filter(r=>r.curAmt>0||r.avg>0).sort((a,b)=>b.curAmt-a.curAmt);
    const maxVal=Math.max(...rows.map(r=>Math.max(r.curAmt,r.avg)),1);
    avgEl.innerHTML=rows.map(r=>{
      const diff=r.curAmt-r.avg,sign=diff>0?'+':'',col=diff>0?'var(--red)':'var(--green)';
      return`<div class="avg-row">
        <div class="avg-cat"><span class="item-dot" style="background:${CAT_COLORS[r.cat]||'#888'}"></span>${r.cat}</div>
        <div class="avg-bars"><div class="avg-bar-avg" style="width:${Math.round(r.avg/maxVal*100)}%;background:${CAT_COLORS[r.cat]||'#888'}"></div><div class="avg-bar-cur" style="width:${Math.round(r.curAmt/maxVal*100)}%;background:${CAT_COLORS[r.cat]||'#888'}"></div></div>
        <div class="avg-diff" style="color:${col}">${sign}${fmt(Math.abs(diff))}</div>
      </div>`;}).join('');
  }else avgEl.innerHTML='<div class="empty-state">2개월 이상 데이터가 쌓이면 표시돼요</div>';
};

// ── 실시간 리스너 ──
onSnapshot(query(collection(db,'expenses'),orderBy('createdAt','desc')),snap=>{
  expenses=snap.docs.map(d=>({id:d.id,...d.data()}));
  renderExpenses();renderCardPerf();buildMonthOptions();
  if(document.getElementById('page-summary').classList.contains('on')) renderSummary();
});
onSnapshot(query(collection(db,'incomes'),orderBy('createdAt','desc')),snap=>{
  incomes=snap.docs.map(d=>({id:d.id,...d.data()}));
  renderIncomes();renderExpenses();
});
onSnapshot(query(collection(db,'savings'),orderBy('createdAt','desc')),snap=>{
  savings=snap.docs.map(d=>({id:d.id,...d.data()}));
  renderSavings();renderExpenses();
});

await loadCards();
document.getElementById('loading').style.display='none';
document.getElementById('app').style.display='block';
buildMonthOptions();
changeSavCycle(); // 초기 주기 세팅
</script>
</body>
</html>
