<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="우리 가계부">
<title>우리 가계부</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0efe9;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#aaa;
  --border:#e5e5e0;--border2:#d0d0ca;
  --green:#1D9E75;--green-bg:#e1f5ee;
  --red:#D85A30;--red-bg:#faece7;
  --blue:#378ADD;--blue-bg:#e6f1fb;
  --amber:#BA7517;--amber-bg:#faeeda;
  --purple:#7F77DD;--teal:#0F6E56;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.06);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
    --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
    --border:#3a3a3c;--border2:#48484a;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;min-height:100vh;overflow-x:hidden}
/* 로딩 */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px}
#loading .logo{font-size:36px}
#loading p{font-size:14px;color:var(--text2)}
/* 네비게이션 */
#nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:0.5px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 6px;gap:3px;border:none;background:none;color:var(--text3);font-size:10px;cursor:pointer;transition:color .15s}
.nav-btn.on{color:var(--blue)}
.nav-btn svg{width:22px;height:22px}
/* 페이지 */
#app{padding-bottom:calc(60px + env(safe-area-inset-bottom))}
.page{display:none;padding:0 0 16px}
.page.on{display:block}
/* 헤더 */
.page-header{padding:16px 16px 0;display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.page-title{font-size:20px;font-weight:600}
.header-btn{padding:6px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);font-size:13px;color:var(--text);cursor:pointer}
/* 카드 */
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin:12px 16px 0;box-shadow:var(--shadow)}
.card-title{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
/* 요약 히어로 */
.hero{background:var(--bg2);border-radius:var(--radius);margin:12px 16px 0;padding:20px}
.hero-label{font-size:12px;color:var(--text2);margin-bottom:4px}
.hero-amount{font-size:32px;font-weight:700;letter-spacing:-1px}
.hero-sub{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:16px}
.hero-item{background:var(--bg);border-radius:var(--radius-sm);padding:10px;text-align:center}
.hero-item-label{font-size:11px;color:var(--text2);margin-bottom:3px}
.hero-item-val{font-size:15px;font-weight:600}
/* 폼 */
.form-group{display:flex;flex-direction:column;gap:8px}
.form-row{display:grid;gap:8px}
.form-row.col2{grid-template-columns:1fr 1fr}
.form-row.col3{grid-template-columns:1fr 1fr 1fr}
input,select,textarea{width:100%;padding:11px 13px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:15px;background:var(--bg2);color:var(--text);outline:none;-webkit-appearance:none;appearance:none}
input:focus,select:focus{border-color:var(--blue);background:var(--bg)}
.submit-btn{width:100%;padding:13px;border-radius:var(--radius);border:none;background:var(--blue);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}
.submit-btn:active{opacity:.85}
.text-btn{background:none;border:1px solid var(--border2);color:var(--text);padding:8px 16px;border-radius:20px;font-size:13px;cursor:pointer}
/* 리스트 */
.list-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:0.5px solid var(--border)}
.list-item:last-child{border-bottom:none}
.item-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.item-info{min-width:0}
.item-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-sub{font-size:12px;color:var(--text2);margin-top:1px}
.item-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.item-amt{font-size:15px;font-weight:600}
.del-btn{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:0 4px;line-height:1}
/* 뱃지 */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-green{background:var(--green-bg);color:var(--teal)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.badge-red{background:var(--red-bg);color:var(--red)}
/* 프로그레스 바 */
.prog-bg{height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;margin:8px 0 4px}
.prog-fill{height:100%;border-radius:4px;transition:width .4s}
/* 카드 실적 */
.perf-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin:8px 16px 0}
.perf-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.perf-name{font-size:15px;font-weight:600}
.perf-owner{font-size:12px;color:var(--text2);margin-top:2px}
.perf-pct{font-size:22px;font-weight:700}
.perf-detail{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-top:4px}
/* 예적금 */
.sav-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin:8px 16px 0}
.sav-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.sav-name{font-size:15px;font-weight:600;margin-bottom:3px}
.sav-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.sav-item label{font-size:11px;color:var(--text2);display:block;margin-bottom:2px}
.sav-item span{font-size:14px;font-weight:500}
.sav-footer{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:0.5px solid var(--border)}
/* 월별요약 */
.summary-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 16px 0}
.stat-card{background:var(--bg2);border-radius:var(--radius-sm);padding:14px}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.stat-val{font-size:18px;font-weight:700}
.avg-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:0.5px solid var(--border)}
.avg-row:last-child{border-bottom:none}
.avg-cat{flex:1;font-size:13px;display:flex;align-items:center;gap:6px}
.avg-bars{flex:2;position:relative;height:5px;background:var(--bg3);border-radius:3px;overflow:visible}
.avg-bar-avg{position:absolute;top:0;left:0;height:100%;border-radius:3px;opacity:.35}
.avg-bar-cur{position:absolute;top:0;left:0;height:100%;border-radius:3px}
.avg-diff{font-size:12px;font-weight:600;min-width:70px;text-align:right}
/* 설정 */
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:0.5px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-label{font-size:14px}
.setting-sub{font-size:12px;color:var(--text2);margin-top:1px}
.setting-val{font-size:14px;font-weight:500;color:var(--blue)}
/* 탭 내 세그먼트 */
.segment{display:flex;background:var(--bg2);border-radius:var(--radius-sm);padding:3px;margin:12px 16px 0;gap:2px}
.seg-btn{flex:1;padding:7px;border-radius:6px;border:none;background:none;font-size:13px;color:var(--text2);cursor:pointer;font-weight:500}
.seg-btn.on{background:var(--bg);color:var(--text);box-shadow:var(--shadow)}
/* 모달 */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:flex-end}
.modal-backdrop.open{display:flex}
.modal{background:var(--bg);border-radius:20px 20px 0 0;width:100%;padding:20px 16px calc(16px + env(safe-area-inset-bottom));max-height:90vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:600;margin-bottom:16px}
/* 셀렉트 화살표 */
.select-wrap{position:relative}
.select-wrap::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none;font-size:12px}
.empty-state{text-align:center;padding:32px 16px;color:var(--text3);font-size:14px}
.green-text{color:var(--green)}
.red-text{color:var(--red)}
.blue-text{color:var(--blue)}
.teal-text{color:var(--teal)}
.section-label{font-size:12px;font-weight:500;color:var(--text2);padding:16px 16px 8px;text-transform:uppercase;letter-spacing:.5px}
</style>
</head>
<body>

<div id="loading">
  <div class="logo">💰</div>
  <p>불러오는 중...</p>
</div>

<div id="app" style="display:none">

<!-- 네비게이션 -->
<nav id="nav">
  <button class="nav-btn on" onclick="showPage('book')" id="nav-book">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>
    가계부
  </button>
  <button class="nav-btn" onclick="showPage('income')" id="nav-income">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2v20M17 7H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
    수입
  </button>
  <button class="nav-btn" onclick="showPage('card')" id="nav-card">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
    카드
  </button>
  <button class="nav-btn" onclick="showPage('saving')" id="nav-saving">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    예적금
  </button>
  <button class="nav-btn" onclick="showPage('summary')" id="nav-summary">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    요약
  </button>
</nav>

<!-- 가계부 -->
<div class="page on" id="page-book">
  <div class="page-header">
    <span class="page-title">가계부</span>
    <button class="header-btn" onclick="openModal('modal-exp')">+ 지출 추가</button>
  </div>
  <div class="hero">
    <div class="hero-label">이번 달 남은 금액</div>
    <div class="hero-amount" id="book-remain">—</div>
    <div class="hero-sub">
      <div class="hero-item">
        <div class="hero-item-label">총 수입</div>
        <div class="hero-item-val blue-text" id="book-income">—</div>
      </div>
      <div class="hero-item">
        <div class="hero-item-label">저축</div>
        <div class="hero-item-val teal-text" id="book-saving">—</div>
      </div>
      <div class="hero-item">
        <div class="hero-item-label">실소비</div>
        <div class="hero-item-val red-text" id="book-spent">0</div>
      </div>
    </div>
  </div>
  <div class="segment">
    <button class="seg-btn on" onclick="filterExp('all',this)">전체</button>
    <button class="seg-btn" onclick="filterExp('이설',this)">이설</button>
    <button class="seg-btn" onclick="filterExp('남편',this)">남편</button>
  </div>
  <div id="exp-list"></div>
</div>

<!-- 수입 -->
<div class="page" id="page-income">
  <div class="page-header">
    <span class="page-title">수입</span>
    <button class="header-btn" onclick="openModal('modal-income')">+ 추가</button>
  </div>
  <div class="summary-stats">
    <div class="stat-card">
      <div class="stat-label">이번 달 총 수입</div>
      <div class="stat-val blue-text" id="income-total">0원</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">급여 외 수입</div>
      <div class="stat-val green-text" id="income-extra">0원</div>
    </div>
  </div>
  <div class="section-label">이설</div>
  <div class="card" style="padding:0 16px"><div id="income-list-이설"></div></div>
  <div class="section-label">남편</div>
  <div class="card" style="padding:0 16px"><div id="income-list-남편"></div></div>
</div>

<!-- 카드 실적 -->
<div class="page" id="page-card">
  <div class="page-header">
    <span class="page-title">카드 실적</span>
    <button class="header-btn" onclick="openModal('modal-card')">카드 설정</button>
  </div>
  <div class="segment">
    <button class="seg-btn on" onclick="filterCard('all',this)">전체</button>
    <button class="seg-btn" onclick="filterCard('이설',this)">이설</button>
    <button class="seg-btn" onclick="filterCard('남편',this)">남편</button>
  </div>
  <div id="card-perf-list"></div>
</div>

<!-- 예적금 -->
<div class="page" id="page-saving">
  <div class="page-header">
    <span class="page-title">예적금</span>
    <button class="header-btn" onclick="openModal('modal-saving')">+ 추가</button>
  </div>
  <div class="summary-stats">
    <div class="stat-card">
      <div class="stat-label">월 납입 총액</div>
      <div class="stat-val teal-text" id="sav-monthly">0원</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">만기 수령 예상</div>
      <div class="stat-val green-text" id="sav-expect">0원</div>
    </div>
  </div>
  <div id="sav-list"></div>
</div>

<!-- 월별 요약 -->
<div class="page" id="page-summary">
  <div class="page-header">
    <span class="page-title">월별 요약</span>
    <div class="select-wrap" style="width:110px">
      <select id="summary-month" onchange="renderSummary()" style="font-size:13px;padding:6px 10px"></select>
    </div>
  </div>
  <div class="summary-stats">
    <div class="stat-card">
      <div class="stat-label">실소비</div>
      <div class="stat-val red-text" id="sum-spent">0원</div>
      <div id="sum-avg-badge" style="margin-top:4px"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">남은 금액</div>
      <div class="stat-val green-text" id="sum-remain">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">카테고리별 지출</div>
    <div id="sum-cat-list"></div>
  </div>
  <div class="card">
    <div class="card-title">평균 대비 이번 달</div>
    <div id="sum-avg-compare"><div class="empty-state">2개월 이상 데이터가 쌓이면 표시돼요</div></div>
  </div>
</div>

</div><!-- /app -->

<!-- 지출 모달 -->
<div class="modal-backdrop" id="modal-exp" onclick="closeModalOutside(event,'modal-exp')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">지출 추가</div>
    <div class="form-group">
      <div class="form-row col2">
        <input type="text" id="exp-name" placeholder="항목 이름">
        <input type="number" id="exp-amt" placeholder="금액" inputmode="numeric">
      </div>
      <input type="date" id="exp-date">
      <div class="form-row col2">
        <div class="select-wrap">
          <select id="exp-cat">
            <option value="">카테고리</option>
            <option>식비</option><option>교통</option><option>쇼핑</option>
            <option>주거</option><option>의료</option><option>문화/여가</option><option>기타</option>
          </select>
        </div>
        <div class="select-wrap">
          <select id="exp-card">
            <option value="현금">현금</option>
            <option>이설_삼성카드</option><option>이설_하나카드</option>
            <option>남편_삼성카드</option><option>남편_롯데카드</option><option>남편_현대카드</option>
          </select>
        </div>
      </div>
      <div class="select-wrap">
        <select id="exp-person">
          <option value="이설">이설</option>
          <option value="남편">남편</option>
          <option value="공동">공동</option>
        </select>
      </div>
      <input type="text" id="exp-memo" placeholder="메모 (선택)">
      <button class="submit-btn" onclick="addExp()">추가하기</button>
    </div>
  </div>
</div>

<!-- 수입 모달 -->
<div class="modal-backdrop" id="modal-income" onclick="closeModalOutside(event,'modal-income')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">수입 추가</div>
    <div class="form-group">
      <div class="form-row col2">
        <input type="text" id="inc-name" placeholder="항목 이름">
        <input type="number" id="inc-amt" placeholder="금액" inputmode="numeric">
      </div>
      <input type="date" id="inc-date">
      <div class="form-row col2">
        <div class="select-wrap">
          <select id="inc-type">
            <option>급여</option><option>부업</option><option>용돈</option>
            <option>환급금</option><option>상여금</option><option>기타</option>
          </select>
        </div>
        <div class="select-wrap">
          <select id="inc-person">
            <option>이설</option><option>남편</option><option>공동</option>
          </select>
        </div>
      </div>
      <input type="text" id="inc-memo" placeholder="메모 (선택)">
      <button class="submit-btn" onclick="addIncome()">추가하기</button>
    </div>
  </div>
</div>

<!-- 카드 설정 모달 -->
<div class="modal-backdrop" id="modal-card" onclick="closeModalOutside(event,'modal-card')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">카드 목표 실적 설정</div>
    <div id="card-setting-list"></div>
    <button class="submit-btn" onclick="saveCardTargets();closeModal('modal-card')">저장</button>
  </div>
</div>

<!-- 예적금 모달 -->
<div class="modal-backdrop" id="modal-saving" onclick="closeModalOutside(event,'modal-saving')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">예적금 추가</div>
    <div class="form-group">
      <div class="form-row col2">
        <input type="text" id="sav-name" placeholder="상품명">
        <div class="select-wrap">
          <select id="sav-type"><option>적금</option><option>예금</option></select>
        </div>
      </div>
      <div class="form-row col2">
        <input type="number" id="sav-amt" placeholder="납입금액" inputmode="numeric">
        <input type="number" id="sav-rate" placeholder="이율 (%)" step="0.01" inputmode="decimal">
      </div>
      <div class="form-row col2">
        <input type="date" id="sav-start" placeholder="시작일">
        <input type="date" id="sav-maturity" placeholder="만기일">
      </div>
      <div class="select-wrap">
        <select id="sav-owner"><option>이설</option><option>남편</option><option>공동</option></select>
      </div>
      <input type="text" id="sav-memo" placeholder="메모 (선택)">
      <button class="submit-btn" onclick="addSaving()">추가하기</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore, collection, addDoc, deleteDoc, doc,
  onSnapshot, setDoc, getDoc, query, orderBy
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

function renderExpenses() {

  const spent = list.reduce((s,e)=>s+e.amt,0);
  const remain = incTotal - spent - savTotal;

  document.getElementById('book-remain').textContent = incTotal ? fmt(remain) : '수입을 먼저 입력해 주세요';
  document.getElementById('book-remain').style.color = remain<0?'var(--red)':remain===0?'var(--text)':'var(--green)';
  document.getElementById('book-income').textContent = fmt(incTotal);

  const el = document.getElementById('exp-list');

window.delSaving = async (id) => { if(confirm('삭제할까요?')) await deleteDoc(doc(db,'savings',id)); };

function calcExpect(sv) {
  if(!sv.maturity||!sv.start||!sv.rate) return null;
  const months = Math.max(1,Math.round((new Date(sv.maturity)-new Date(sv.start))/(1000*60*60*24*30.44)));
  if(sv.type==='적금'){
    return Math.round(sv.amt*months + sv.amt*months*(months+1)/2*(sv.rate/100/12));
  } else {
    return Math.round(sv.amt*(1+(sv.rate/100)*(months/12)));
  }
}

function dDay(maturity) {
  if(!maturity) return {text:'만기일 미설정',color:'var(--text3)'};
  const diff = Math.ceil((new Date(maturity)-new Date())/(1000*60*60*24));
  if(diff<0) return {text:'만기 완료',color:'var(--green)'};
  if(diff===0) return {text:'오늘 만기',color:'var(--green)'};
  if(diff<=30) return {text:'D-'+diff,color:'var(--red)'};
  if(diff<=90) return {text:'D-'+diff,color:'var(--amber)'};
  return {text:'D-'+diff,color:'var(--green)'};
}

function progPct(start,maturity) {
  if(!start||!maturity) return 0;
  const s=new Date(start),m=new Date(maturity),n=new Date();
  return Math.min(100,Math.max(0,Math.round((n-s)/(m-s)*100)));
}

function renderSavings() {
  const monthly = savings.reduce((s,sv)=>s+sv.amt,0);
  const expects = savings.map(calcExpect).filter(Boolean);
  const totalExpect = expects.reduce((a,b)=>a+b,0);
  document.getElementById('sav-monthly').textContent = fmt(monthly);
  document.getElementById('sav-expect').textContent = totalExpect?fmt(totalExpect):'—';

  const el = document.getElementById('sav-list');
  if(!savings.length){ el.innerHTML='<div class="empty-state">등록된 예적금이 없어요</div>'; return; }
  el.innerHTML = savings.map(sv=>{
    const dd = dDay(sv.maturity);
    const pct = progPct(sv.start,sv.maturity);
    const expect = calcExpect(sv);
    return `<div class="sav-card">
      <div class="sav-header">
        <div>
          <div class="sav-name">${sv.name}</div>
          <span class="badge ${sv.type==='예금'?'badge-blue':'badge-green'}">${sv.type}</span>
          <span class="badge" style="margin-left:4px;background:var(--bg2);color:var(--text2)">${sv.owner}</span>
        </div>
        <button class="del-btn" onclick="delSaving('${sv.id}')">×</button>
      </div>
      <div class="sav-grid">
        <div class="sav-item"><label>월 납입금액</label><span class="teal-text">${fmt(sv.amt)}</span></div>
        <div class="sav-item"><label>이율</label><span>${sv.rate?sv.rate+'%':'—'}</span></div>
        <div class="sav-item"><label>시작일</label><span>${sv.start||'—'}</span></div>
        <div class="sav-item"><label>만기일 (D-day)</label><span style="color:${dd.color}">${sv.maturity?sv.maturity+' '+dd.text:dd.text}</span></div>
      </div>
      ${sv.start&&sv.maturity?`<div class="prog-bg"><div class="prog-fill" style="width:${pct}%;background:var(--teal)"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:8px"><span>진행률</span><span>${pct}%</span></div>`:''}
      <div class="sav-footer">
        <span style="font-size:12px;color:var(--text2)">만기 수령 예상</span>
        <span style="font-size:15px;font-weight:600;color:var(--green)">${expect?fmt(expect):'—'}</span>
      </div>
    </div>`;
  }).join('');
}

// ── 월별 요약 ──
function buildMonthOptions() {
  const all = [...new Set([...expenses.map(e=>e.date?.slice(0,7)), ...incomes.map(i=>i.date?.slice(0,7)), nowYM()].filter(Boolean))].sort().reverse();
  const sel = document.getElementById('summary-month');
  const cur = sel.value || nowYM();
  sel.innerHTML = all.map(m=>`<option value="${m}" ${m===cur?'selected':''}>${m}</option>`).join('');
}

window.renderSummary = () => {
  buildMonthOptions();
  const ym = document.getElementById('summary-month').value || nowYM();
  const exps = expenses.filter(e=>e.date?.startsWith(ym));
  const incs = incomes.filter(i=>i.date?.startsWith(ym));
  const spent = exps.reduce((s,e)=>s+e.amt,0);
  const savMonthly = savings.reduce((s,sv)=>s+sv.amt,0);
  const incTotal = incs.reduce((s,i)=>s+i.amt,0);
  const remain = incTotal - spent - savMonthly;

  document.getElementById('sum-spent').textContent = fmt(spent);
  document.getElementById('sum-remain').textContent = incTotal?fmt(remain):'수입 입력 필요';
  document.getElementById('sum-remain').style.color = remain<0?'var(--red)':'var(--green)';

  // 평균 대비 배지
  const allMonths = [...new Set(expenses.map(e=>e.date?.slice(0,7)).filter(Boolean))].sort();
  const pastMonths = allMonths.filter(m=>m!==ym);
  if(pastMonths.length>0){
    const pastAvg = Math.round(pastMonths.map(m=>expenses.filter(e=>e.date?.startsWith(m)).reduce((s,e)=>s+e.amt,0)).reduce((a,b)=>a+b,0)/pastMonths.length);
    const diff = spent - pastAvg;
    const sign = diff>0?'+':'';
    const col = diff>0?'var(--red)':'var(--green)';
    const bg = diff>0?'var(--red-bg)':'var(--green-bg)';
    document.getElementById('sum-avg-badge').innerHTML=`<span class="badge" style="background:${bg};color:${col}">평균 대비 ${sign}${fmt(Math.abs(diff))}</span>`;
  } else {
    document.getElementById('sum-avg-badge').innerHTML='';
  }

  // 카테고리별
  const catMap={};
  exps.forEach(e=>{catMap[e.cat]=(catMap[e.cat]||0)+e.amt;});
  const cats=Object.keys(catMap).sort((a,b)=>catMap[b]-catMap[a]);
  const catEl=document.getElementById('sum-cat-list');
  if(!cats.length){catEl.innerHTML='<div class="empty-state">지출 내역이 없어요</div>';}
  else {
    catEl.innerHTML=cats.map(c=>`
      <div class="list-item">
        <div class="item-left"><span class="item-dot" style="background:${CAT_COLORS[c]||'#888'}"></span><span>${c}</span></div>
        <div class="item-right"><span style="font-weight:600">${fmt(catMap[c])}</span><span style="font-size:12px;color:var(--text2);margin-left:6px">${Math.round(catMap[c]/spent*100)}%</span></div>
      </div>`).join('');
  }

  // 평균 대비 카테고리
  const avgEl=document.getElementById('sum-avg-compare');
  if(pastMonths.length>0){
    const allCats=[...new Set(expenses.map(e=>e.cat))];
    const rows=allCats.map(cat=>{
      const curAmt=exps.filter(e=>e.cat===cat).reduce((s,e)=>s+e.amt,0);
      const pastAmts=pastMonths.map(m=>expenses.filter(e=>e.date?.startsWith(m)&&e.cat===cat).reduce((s,e)=>s+e.amt,0));
      const avg=Math.round(pastAmts.reduce((a,b)=>a+b,0)/pastAmts.length);
      return{cat,curAmt,avg};
    }).filter(r=>r.curAmt>0||r.avg>0).sort((a,b)=>b.curAmt-a.curAmt);
    const maxVal=Math.max(...rows.map(r=>Math.max(r.curAmt,r.avg)),1);
    avgEl.innerHTML=rows.map(r=>{
      const diff=r.curAmt-r.avg;const sign=diff>0?'+':'';
      const col=diff>0?'var(--red)':'var(--green)';
      return `<div class="avg-row">
        <div class="avg-cat"><span class="item-dot" style="background:${CAT_COLORS[r.cat]||'#888'}"></span>${r.cat}</div>
        <div class="avg-bars">
          <div class="avg-bar-avg" style="width:${Math.round(r.avg/maxVal*100)}%;background:${CAT_COLORS[r.cat]||'#888'}"></div>
          <div class="avg-bar-cur" style="width:${Math.round(r.curAmt/maxVal*100)}%;background:${CAT_COLORS[r.cat]||'#888'}"></div>
        </div>
        <div class="avg-diff" style="color:${col}">${sign}${fmt(Math.abs(diff))}</div>
      </div>`;
    }).join('');
  } else {
    avgEl.innerHTML='<div class="empty-state">2개월 이상 데이터가 쌓이면 표시돼요</div>';
  }
};
